name: Build Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: rrh-linux-amd64
            artifact: dist/rrh-linux-amd64

          - os: windows-latest
            name: rrh-windows-amd64
            artifact: dist/rrh-windows-amd64.exe

          - os: macos-13
            name: rrh-darwin-amd64
            artifact: dist/rrh-darwin-amd64

          - os: macos-14
            name: rrh-darwin-arm64
            artifact: dist/rrh-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install -U pip pyinstaller

      - name: Build binary
        run: |
          python -m PyInstaller --clean --onefile --name "${{ matrix.name }}" rrh.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
